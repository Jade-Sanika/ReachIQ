<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Notifications - ReachIQ</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">ReachIQ</div>
        <div class="nav-links">
            <a href="influencer-dashboard.html">Dashboard</a>
            <a href="influencer-offers.html">Offers</a>
            <a href="influencer-profile.html">Profile</a>
            <button onclick="logout()" class="btn-logout">Sign Out</button>
        </div>
    </nav>

    <div class="container">
        <header class="dashboard-header">
            <p style="color:var(--gold);font-size:0.8rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem;">Inbox</p>
            <h1>Creator Notifications</h1>
            <p style="margin-top:0.4rem;">See new offers, negotiation updates, deliverable reviews, milestone confirmations, and payment progress.</p>
        </header>

        <section class="notifications-shell">
            <div id="notificationsList" class="notification-list">
                <div class="empty-state">
                    <div class="loading-spinner"></div>
                    <p>Loading notifications...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/profile-menu.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
        const supabaseClient = window.ReachIQ.createSupabaseClient();
        window.ReachIQ.requireRole(supabaseClient, 'influencer');
        async function logout() { await supabaseClient.auth.signOut(); window.location.href = '/'; }
    </script>
</body>
</html>
